camera:
  type: picamera2
  mock_data: mock_data
  lores_yuv_format: i420
  lores_uv_swap: false

projector:
  width: 1024
  height: 768
  display:
    fullscreen: true
    screen_index: null
    driver: kmsdrm
  patterns:
    contrast: 0.6
    brightness_offset: 0.45
    min_intensity: 0.10

scanner:
  storage_root: data/runs
  scan:
    mode: stable
    n_steps_fast: 4
    n_steps_stable: 8
    n_steps: 8
    frequencies: [1.0, 4.0, 16.0]
    frequency_semantics: cycles_across_dimension
    orientation: vertical
    brightness: 1.0
    width: 1024
    height: 768
    settle_ms: 150
    settle_ms_first_step: 350
    settle_ms_freq_switch: 350
    freq_switch_warmup_ms: 250
    flush_frames_per_step: 1
    flush_frames_on_freq_switch: 2
    max_freq_retries: 2
    preview_fps: 10.0
    phase_convention: "atan2(-S,C)"
    exposure_us: 2000
    analogue_gain: 1.0
    awb_enable: false
    ae_enable: false
  phase:
    sat_low: 0
    sat_high: 250
    B_thresh: 7
    A_min: 15
    debug_percentiles: [1, 99]
    postmask_cleanup:
      enabled: true
      min_component_area: 200
      fill_small_holes: true
      max_hole_area: 200
  unwrap:
    mask_post:
      enabled: true
      keep_largest_component: true
      closing_radius_px: 3
      erosion_radius_px: 2
      min_area_px: 5000
      b_thresh_unwrap: 0
  roi:
    ref_method: median_over_frames
    downscale_max_w: 640
    blur_ksize: 7
    black_bg_percentile: 82
    threshold_offset: 22
    min_area_ratio: 0.01
    max_area_ratio: 0.50
    close_iters: 1
    open_iters: 2
    fill_holes: true
    post:
      enabled: true
      keep_largest_component: true
      fill_small_holes: true
      max_hole_area: 2000
      dilate_radius_px: 10
  reconstruction:
    enabled: true
    max_points: 800000
    max_reproj_err_px: 15.0
    z_min_m: 0.05
    z_max_m: 5.0
    downsample:
      enabled: true
      stride: 2
    ply:
      write_rgb: true
  reconstruction_quality:
    enabled: false
    max_reproj_error_px: 1.5
    min_modulation_B: 25
    enable_smoothing: false
    enable_sweep: false

calibration:
  root: data/calibration
  camera_root: data/calibration/camera
  camera:
    min_valid_detections: 10
    capture_flush_frames: 1
    board_type: checkerboard
    checkerboard:
      squares_x: 9
      squares_y: 7
      cols: 8
      rows: 6
      square_size_mm: 10.0
    charuco:
      dict: DICT_4X4_50
      squares_x: 9
      squares_y: 7
      square_length_m: 0.015
      marker_length_m: 0.011
  projector_v2:
    charuco:
      dict: DICT_4X4_50
      squares_x: 9
      squares_y: 7
      square_length_m: 0.015
      marker_length_m: 0.011
    gating:
      min_corners: 16
      min_markers: 8
      border_margin_px: 20
      min_area_ratio: 0.05
      max_area_ratio: 0.60
    coverage:
      grid_x: 3
      grid_y: 3
      min_bins_filled: 5
      tilt_buckets_deg: [0, 10, 20, 35]
      min_bucket_counts: [2, 2, 2]
    solve:
      min_views: 8
      min_improvement_px: 0.05
      max_prune_steps: 6
    uv_refine:
      enabled: true
      patch_radius_px: 12
      plane_fit: true
      max_delta_px: 3.0

inspection:
  reference_root: data/reference_models
  tolerance_mm: 0.50
  normal_knn: 30
  mesh_sample_points: 120000
  icp_max_iters: 30
  icp_tolerance: 1.0e-6
  icp_sample_size: 50000
  cluster_radius_mm: 1.5
  min_cluster_points: 25
  sample_seed: 0
