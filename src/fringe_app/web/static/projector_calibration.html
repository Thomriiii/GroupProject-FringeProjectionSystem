<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projector Calibration</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Projector Calibration</h1>
      <div class="header-right">
        <a href="/">Back to Pipeline</a>
        <a href="/calibration/projector-v2">Use v2</a>
      </div>
    </header>

    <section>
      <h2>Capture Controls</h2>
      <div class="actions">
        <button id="new_session_btn">Start New Session</button>
        <select id="session_select"></select>
        <button id="continue_session_btn">Continue Session</button>
        <button id="capture_view_btn" disabled>Capture Pose</button>
      </div>
    </section>

    <section>
      <h2>Solve Controls</h2>
      <div class="actions">
        <button id="gamma_btn" disabled>Calibrate Gamma</button>
        <button id="solve_btn" disabled>Run Solve</button>
      </div>
    </section>

    <section>
      <div id="status" class="status">No session</div>
      <div id="error" class="error"></div>
      <div id="capture_feedback" class="status"></div>
      <div id="solve_feedback" class="status"></div>
      <div id="summary"></div>
    </section>

    <section class="preview">
      <h2>Live Preview</h2>
      <img id="preview_img" alt="live preview" />
    </section>

    <section>
      <h2>Views</h2>
      <div id="views_grid" class="captures-grid"></div>
    </section>

    <section>
      <h2>Coverage</h2>
      <div id="coverage_summary"></div>
      <div id="coverage_heatmap"></div>
      <div id="coverage_image"></div>
    </section>

    <section>
      <h2>Results</h2>
      <pre id="results_json"></pre>
    </section>
  </div>

  <script src="/static/projector_calibration.js"></script>
</body>
</html>
