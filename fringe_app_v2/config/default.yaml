web:
  host: 0.0.0.0
  port: 5000
  debug: false

storage:
  run_root: fringe_app_v2/runs

camera:
  type: picamera2
  mock_data: mock_data
  lores_yuv_format: i420
  lores_uv_swap: false
  preview_fps: 10.0

display:
  fullscreen: true
  screen_index: null
  vsync: true
  idle_white_enabled: true
  idle_white_dn: 255

calibration:
  root: data/calibration
  camera_intrinsics_path: data/calibration/camera/intrinsics_latest.json
  projector_stereo_path: data/calibration/projector/stereo_latest.json

scan:
  width: 1024
  height: 768
  n_steps: 8
  frequencies: [1.0, 4.0, 16.0]
  frequency_semantics: cycles_across_dimension
  orientations: [vertical, horizontal]
  settle_ms: 180
  settle_ms_first_step: 400
  settle_ms_freq_switch: 400
  freq_switch_warmup_ms: 250
  flush_frames_per_step: 1
  flush_frames_on_freq_switch: 2
  save_patterns: false
  exposure_us: 2000
  analogue_gain: 1.0
  awb_enable: false
  ae_enable: false
  brightness: 1.0
  contrast: 0.6
  brightness_offset: 0.45
  min_intensity: 0.10
  phase_origin_rad: 0.0
  projector_u_offset_px: 0.0
  projector_v_offset_px: 18.0

gamma: 2.2

phase_quality:
  min_modulation: 10
  min_intensity: 5
  max_intensity: 250
  calibration_fail_on_mismatch: false

exposure_lock:
  enabled: true
  target_dn: 128.0
  tolerance_dn: 8.0
  max_iters: 8
  min_exposure_us: 500
  max_exposure_us: 12000
  min_gain: 1.0
  max_gain: 4.0
  settle_ms: 180
  flush_frames: 2

roi:
  method: not_dark
  border_width_px: 24
  background_percentile: 80
  gray_offset: 6
  max_channel_offset: 8
  min_foreground_gray: 12
  min_foreground_max_channel: 16
  sigma_px: 1.5
  close_radius_px: 3
  open_radius_px: 1
  ref_method: median_over_frames
  downscale_max_w: 640
  blur_ksize: 7
  black_bg_percentile: 82
  threshold_offset: 22
  min_area_ratio: 0.01
  max_area_ratio: 0.50
  close_iters: 1
  open_iters: 2
  fill_holes: true
  post:
    enabled: true
    keep_largest_component: true
    fill_small_holes: true
    max_hole_area: 2000
    dilate_radius_px: 12

phase:
  sat_low: 0
  sat_high: 250
  B_thresh: 7
  A_min: 15
  debug_percentiles: [1, 99]
  postmask_cleanup:
    enabled: true
    min_component_area: 200
    fill_small_holes: true
    max_hole_area: 200
  masks:
    defects:
      enabled: true
      keep_largest_component: true
      dilate_radius_px: 3
      erosion_radius_px: 0
    display:
      enabled: true
      use_b_smooth: true
      b_smooth_ksize: 5
      b_thresh_display: 5

unwrap:
  use_roi: true
  mask_post:
    enabled: true
    keep_largest_component: true
    closing_radius_px: 3
    erosion_radius_px: 1
    min_area_px: 5000
    b_thresh_unwrap: 0

uv_gate:
  enabled: true
  min_u_range_px: 40.0
  min_v_range_px: 40.0
  max_edge_pct: 0.10
  max_zero_pct: 0.01
  min_valid_ratio: 0.03

reconstruction:
  z_min_m: 0.05
  z_max_m: 5.0
  max_reproj_err_px: 15.0
  min_component_px: 50
  sor_enabled: true
  sor_k: 20
  sor_std_multiplier: 3.0

enable_flatten: true
flatten_sigma: 8

turntable:
  enabled: false
  ip: null              # ESP8266 IP on local network (e.g. 192.168.0.50)
  port: 80
  timeout_s: 10.0
  settle_ms: 600        # ms to wait after rotation before scanning
  auto_discover: true   # nmap scan on startup when no ip is set

multi_scan:
  angles_deg: [0, 90, 180, 270]
  roi_light_check:
    settle_ms: 350      # wait after idle-white before ROI capture
    flush_frames: 3     # discard stale black frames after projector changes
    retries: 2
    min_mean_dn: 8.0
    min_p99_dn: 25.0
    fail_on_dark: true
  rotation_sign: -1.0    # +1 = CW positive, -1 = CCW positive; calibrated from latest merged scan
  rotation_axis_vector: [-0.045275, 0.439239, 0.897229]  # calibrated tilted axis direction, session 20260501_135837
  axis_x_m: -0.04755     # rotation axis X in camera coords m — from turntable cal session 20260501_135837
  axis_y_m: -0.05557     # rotation axis Y in camera coords m — from turntable cal session 20260501_135837
  axis_z_m: null         # use each merged set's mean depth
  fiducials:
    enabled: true
    max_reproj_err_px: 200.0
    # Auto-detection parameters (HSV thresholding on roi_capture.png)
    n_marks: 4
    detect_hue_ranges:      # Marker can look red/orange/yellow depending on capture
      - [340.0, 25.0]       # red, wrapping through 0°
      - [25.0, 90.0]        # orange/yellow/green-yellow
    detect_sat_min: 0.55
    detect_val_min: 0.35
    detect_min_px: 50       # Minimum pixels per detected cluster
    detect_max_px: 6000     # Reject large red blobs from the object/rim
    # Fallback fixed pixel coords (used only if auto-detect fails)
    pixel_coords:
      - [616, 168]   # top-right
      - [234, 286]   # left
      - [752, 485]   # right
      - [382, 629]   # bottom
  axis_from_top:
    enabled: false
    side: max
    percentile: 95.0
    min_points: 500
  axis_from_edges:
    enabled: true
    max_shift_m: 0.015
    coarse_steps: 7
    sample_points: 3000
    seed: 1
  refine_icp:
    enabled: true
    max_points: 15000
    max_iterations: 30
    max_correspondence_m: 0.040  # 40 mm — wide enough to cover ~30 mm axis residual when fiducials fail
    max_rotation_deg: 10.0
    max_translation_m: 0.040
    min_pairs: 300
    seed: 0
    top_anchor:
      enabled: false
      max_translation_m: 0.01

defect:
  smoothing: 12
  depth_threshold_mm: 1.5
  min_area_px: 30
  mm_per_pixel: 0.165
  open_radius_px: 1
  close_radius_px: 2
  boundary_exclusion_px: 12
  max_area_px: 0
  max_area_fraction: 0.005
  max_area_floor_px: 500
  edge_suppression_enabled: true
  edge_percentile: 90
  edge_exclusion_radius_px: 12
  edge_overlap_reject: 0.25
  linear_aspect_ratio: 4.0
  linear_max_minor_mm: 0.0
  point_aspect_min: 0.8
  point_max_major_mm: 5.0

turntable_calibration:
  enabled: true
  nominal_step_deg: 15
  total_degrees: 360
  storage_root: data/turntable/sessions

  board:
    squares_x: 9
    squares_y: 7
    square_length_m: 0.010
    marker_length_m: 0.0075
    dict_name: DICT_4X4_50
    dpi: 300
    add_center_mark: true
    add_scale_bar: true

  charuco:
    dict: DICT_4X4_50
    squares_x: 9
    squares_y: 7
    square_length_m: 0.010
    marker_length_m: 0.0075
    min_corners: 6
    max_reprojection_error_px: 2.0

  camera:
    exposure_us: 15000
    analogue_gain: 4.0
    awb_enable: true
    settle_ms: 300          # wait after applying controls before first capture

  capture:
    settle_ms_after_rotation: 300

  inspection_2d:
    output_root: data/inspection_2d/sessions
