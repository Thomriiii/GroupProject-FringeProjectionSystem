<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Camera Calibration</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  <style>
    body { font-family: monospace; background: #111; color: #ddd; margin: 0; }
    main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; max-width: 1200px; margin: 0 auto; }
    @media (max-width: 700px) { main { grid-template-columns: 1fr; } }
    h1 { margin: 0 0 4px 0; font-size: 1.2em; }
    h2 { margin: 12px 0 6px 0; font-size: 1em; border-bottom: 1px solid #333; padding-bottom: 4px; }
    header { display: flex; align-items: center; gap: 16px; padding: 12px 16px; background: #1a1a1a; border-bottom: 1px solid #333; }
    header a { color: #88f; text-decoration: none; font-size: 0.85em; }
    .panel { background: #1a1a1a; border: 1px solid #333; border-radius: 6px; padding: 12px; margin-bottom: 12px; }
    button { background: #224; color: #aaf; border: 1px solid #446; border-radius: 4px; padding: 6px 14px; cursor: pointer; font-family: monospace; font-size: 0.9em; }
    button:disabled { opacity: 0.4; cursor: default; }
    button:hover:not(:disabled) { background: #334; }
    .btn-primary { background: #142; color: #6f6; border-color: #264; }
    .btn-primary:hover:not(:disabled) { background: #1a4; }
    .btn-danger { background: #421; color: #f86; border-color: #642; font-size: 0.8em; padding: 3px 8px; }
    select { background: #2a2a2a; color: #ddd; border: 1px solid #444; border-radius: 4px; padding: 4px 8px; font-family: monospace; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; align-items: center; }
    .status-bar { padding: 6px 10px; background: #222; border-radius: 4px; font-size: 0.85em; margin-bottom: 8px; }
    .error-bar { padding: 6px 10px; background: #320; border-radius: 4px; font-size: 0.85em; color: #f86; display: none; margin-bottom: 8px; }
    .pill { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 0.78em; font-weight: bold; }
    .pill-good { background: #1a3a1a; color: #6f6; }
    .pill-bad { background: #3a1a1a; color: #f66; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
    th, td { padding: 5px 8px; text-align: left; border-bottom: 1px solid #2a2a2a; }
    th { color: #888; font-weight: normal; }
    img.preview { width: 100%; border: 1px solid #333; border-radius: 4px; }
    img.overlay { width: 100%; border: 1px solid #333; border-radius: 4px; margin-top: 6px; }
    .results { background: #151515; border: 1px solid #333; border-radius: 4px; padding: 10px; margin-top: 8px; display: none; }
    .results dl { margin: 0; display: grid; grid-template-columns: auto 1fr; gap: 2px 12px; }
    .results dt { color: #888; }
    .results dd { margin: 0; }
    #overlayImg { display: none; }
  </style>
</head>
<body>

<header>
  <h1>Camera Calibration</h1>
  <a href="/">← Back to Pipeline</a>
</header>

<main>

  <!-- LEFT: Live preview + session + capture -->
  <div>
    <div class="panel">
      <h2>Live Preview</h2>
      <img class="preview" src="/video" alt="camera feed">

      <div style="margin-top:10px;">
        <h2>Session</h2>
        <div class="controls">
          <button id="newSessionBtn" class="btn-primary">New Session</button>
        </div>
        <div class="controls">
          <select id="sessionSelect" style="flex:1;">
            <option value="">— select existing session —</option>
          </select>
          <button id="loadSessionBtn">Load</button>
        </div>
        <div class="status-bar" id="statusBar">No session loaded.</div>
        <div class="error-bar" id="errorBar"></div>
      </div>

      <div style="margin-top:10px;">
        <h2>Capture</h2>
        <p style="color:#888;font-size:0.85em;margin:0 0 8px 0;">
          Hold the ChArUco board at varied angles and positions. Aim for at least 15 good detections.
        </p>
        <div class="controls">
          <button id="captureBtn" class="btn-primary" disabled>Capture Frame</button>
        </div>
        <img class="overlay" id="overlayImg" alt="overlay">
      </div>
    </div>
  </div>

  <!-- RIGHT: Capture list + Solve -->
  <div>
    <div class="panel">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Captures</h2>
        <button id="solveBtn" disabled>Solve Intrinsics</button>
      </div>
      <p id="noCapMsg" style="color:#666;font-size:0.85em;">No captures yet.</p>
      <table id="capTable" style="display:none;">
        <thead><tr><th>#</th><th>Status</th><th>Markers</th><th>Corners</th><th>View</th><th></th></tr></thead>
        <tbody id="capTbody"></tbody>
      </table>

      <div class="results" id="resultsPanel">
        <h2 style="margin-top:0;">Intrinsics Result</h2>
        <div id="resultsContent"></div>
      </div>
    </div>
  </div>

</main>

<script>
const API = '/api/calibration/camera';
let currentSession = null;

async function apiPost(url, body) {
  const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  return r.json();
}
async function apiGet(url) { return (await fetch(url)).json(); }
async function apiDelete(url) { return (await fetch(url, {method:'DELETE'})).json(); }

function setStatus(msg, isError) {
  document.getElementById('statusBar').textContent = msg;
  const eb = document.getElementById('errorBar');
  if (isError) { eb.textContent = msg; eb.style.display = 'block'; }
  else eb.style.display = 'none';
}

function pillHtml(found) {
  return found
    ? '<span class="pill pill-good">good</span>'
    : '<span class="pill pill-bad">bad</span>';
}

function renderCaptures(captures) {
  const tbody = document.getElementById('capTbody');
  const noMsg = document.getElementById('noCapMsg');
  const table = document.getElementById('capTable');
  if (!captures || captures.length === 0) {
    table.style.display = 'none'; noMsg.style.display = ''; return;
  }
  noMsg.style.display = 'none'; table.style.display = '';
  tbody.innerHTML = captures.map(c => `<tr>
    <td>${c.capture_id}</td>
    <td>${pillHtml(c.found)}</td>
    <td>${c.marker_count ?? '—'}</td>
    <td>${c.corner_count ?? '—'}</td>
    <td><button onclick="showOverlay('${currentSession}','${c.capture_id}')" style="padding:2px 8px;font-size:0.75em;">overlay</button></td>
    <td><button class="btn-danger" onclick="deleteCapture('${currentSession}','${c.capture_id}')">✕</button></td>
  </tr>`).join('');
}

async function showOverlay(sid, capId) {
  const img = document.getElementById('overlayImg');
  img.src = `${API}/session/${sid}/capture/${capId}/overlay?t=${Date.now()}`;
  img.style.display = 'block';
}

async function deleteCapture(sid, capId) {
  if (!confirm(`Delete capture ${capId}?`)) return;
  await apiDelete(`${API}/session/${sid}/capture/${capId}`);
  await loadSession(sid);
}

async function loadSessions() {
  const data = await apiGet(`${API}/sessions`);
  const sel = document.getElementById('sessionSelect');
  sel.innerHTML = '<option value="">— select existing session —</option>';
  (data.sessions || []).forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.session_id;
    opt.textContent = `${s.session_id}  (${s.n_captures} captures, ${s.n_good} good${s.solved ? ', solved' : ''})`;
    sel.appendChild(opt);
  });
}

async function loadSession(sid) {
  const data = await apiGet(`${API}/session/${sid}`);
  if (data.error) { setStatus('Session not found', true); return; }
  currentSession = sid;
  setStatus(`Session: ${sid}  — ${data.n_good} / ${data.n_captures} good`);
  document.getElementById('captureBtn').disabled = false;
  document.getElementById('solveBtn').disabled = data.n_good < 5;
  renderCaptures(data.captures || []);
  if (data.solved && data.calibration) {
    showResults(data.calibration);
  }
}

function showResults(cal) {
  const panel = document.getElementById('resultsPanel');
  const per = (cal.per_view_errors || []);
  const maxErr = per.length ? Math.max(...per.map(v => v.rms_px || 0)) : null;
  document.getElementById('resultsContent').innerHTML = `
    <dl>
      <dt>RMS error</dt><dd>${(cal.rms_px||0).toFixed(3)} px</dd>
      <dt>Max per-view</dt><dd>${maxErr !== null ? maxErr.toFixed(3)+' px' : '—'}</dd>
      <dt>Views used</dt><dd>${cal.n_views}</dd>
      <dt>Image size</dt><dd>${(cal.image_size||[]).join(' × ')}</dd>
    </dl>
    <p style="color:#6f6; margin:8px 0 0 0; font-size:0.85em;">✓ Intrinsics saved to data/calibration/camera/intrinsics_latest.json</p>
  `;
  panel.style.display = '';
}

document.getElementById('newSessionBtn').addEventListener('click', async () => {
  const data = await apiPost(`${API}/session/new`, {});
  if (data.ok) {
    await loadSessions();
    await loadSession(data.session_id);
    document.getElementById('sessionSelect').value = data.session_id;
  } else {
    setStatus('Failed: ' + (data.error || ''), true);
  }
});

document.getElementById('loadSessionBtn').addEventListener('click', async () => {
  const id = document.getElementById('sessionSelect').value;
  if (!id) { setStatus('Select a session first', true); return; }
  await loadSession(id);
});

document.getElementById('captureBtn').addEventListener('click', async () => {
  if (!currentSession) return;
  setStatus('Capturing…');
  const data = await apiPost(`${API}/session/${currentSession}/capture`, {});
  if (data.ok) {
    const status = data.found ? `✓ corners=${data.corner_count}` : `✗ ${data.reject_reason || 'not detected'}`;
    setStatus(`Captured: ${status}`);
    showOverlay(currentSession, data.capture_id);
    await loadSession(currentSession);
  } else {
    setStatus('Capture failed: ' + (data.error || ''), true);
  }
});

document.getElementById('solveBtn').addEventListener('click', async () => {
  if (!currentSession) return;
  setStatus('Solving intrinsics…');
  document.getElementById('solveBtn').disabled = true;
  const data = await apiPost(`${API}/session/${currentSession}/solve`, {});
  if (data.ok) {
    showResults(data);
    setStatus(`Solve complete — RMS: ${(data.rms_px||0).toFixed(3)} px`);
  } else {
    setStatus('Solve failed: ' + (data.error || ''), true);
  }
  document.getElementById('solveBtn').disabled = false;
});

loadSessions();
</script>

</body>
</html>
